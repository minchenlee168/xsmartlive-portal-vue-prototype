<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通知中心 — 規範版（依 design.md）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<style>
/* ================= 專案設計 token（對齊 src/style.css / design.md 第二、三、七節） =================
   本檔為獨立 HTML 原型，無法直接載入 PrimeVue/Tailwind；改以 CSS 變數鏡射專案 token，
   所有顏色/圓角/陰影一律走 token，不再自訂裸色。舊 class 名稱以別名指回專案 token。 */
:root{
  /* 品牌主色 ramp（#7008e7 = 500，對齊 src/style.css） */
  --primary:#7008e7;
  --primary-50:#f5f0fe; --primary-100:#e9ddfd; --primary-200:#d3bbfb;
  --primary-300:#b88ef7; --primary-400:#9a55f2; --primary-700:#5006a3;
  --primary-800:#3e0480; --primary-900:#2f0362; --primary-950:#1d013e;
  --primary-bg:#7008e7; --primary-hover-bg:#5b06bd;
  --primary-surface:#F2EBFF;              /* design.md §2 主色 Soft：淡紫底/選中/tag */

  /* 中性 surface / 邊框 / 文字（design.md §2） */
  --surface-0:#ffffff; --surface-50:#f8fafc; --surface-100:#f1f5f9; --surface-200:#e2e8f0;
  --page-bg:#f1f5f9;                      /* 內容區背景（surface-100，對齊 src/style.css --page-bg） */
  --border-color:#e5e7eb;                 /* 一般 hairline（border-gray-200，design.md §7.3） */
  --border-light:#e2e8f0;
  --border-strong:#cbd5e1;                /* 輸入框邊框（design.md §2 #CBD5E1） */
  --text:#334155;                         /* 文字主色（surface-700） */
  --text-muted:#64748b;                   /* 文字次色 */
  --muted:#94a3b8;                        /* placeholder / 最淺 metadata */

  /* 功能色（design.md §2，成對 strong/soft） */
  --success:#16a34a; --success-soft:#dcfce7;
  --danger:#dc2626;  --danger-soft:#fee2e2;
  --warn:#ca8a04;    --warn-soft:#fef9c3;
  --info:#2563eb;    --info-soft:#dbeafe;

  /* 圓角 / 陰影（design.md §7.3、§8；卡片陰影對齊 src/style.css --card-shadow） */
  --r:6px; --r-card:10px;
  --card-shadow:0px 1px 3px 0px rgba(0,0,0,0.1),0px 1px 2px -1px rgba(0,0,0,0.1);

  /* 舊 class 名稱別名（沿用既有 class，值改指專案 token） */
  --primary-soft:var(--primary-surface);
  --primary-hover:var(--primary-hover-bg);
  --border:var(--border-color);
  --text-2:var(--text-muted);
  --neutral-100:var(--surface-100);
  --bg:var(--page-bg);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.5;}
button,input,select,textarea{font-family:inherit;}

/* ================= 框架 ================= */
.app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{flex:0 0 60px;height:60px;padding:0 24px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:center;gap:16px;}
.logo{width:32px;height:32px;border-radius:8px;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
.sys-title{font-size:20px;font-weight:500;margin:0;white-space:nowrap;}
.collapse-btn{width:32px;height:32px;border-radius:999px;border:none;background:var(--surface-100);color:var(--text-2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.collapse-btn:hover{background:var(--surface-200);}
.collapse-btn.rot{transform:rotate(180deg);}
.switcher{height:36px;border:1px solid var(--border-strong);border-radius:var(--r);padding:0 12px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;background:#fff;cursor:pointer;}
.switcher.store{width:224px;}
.tb-right{display:inline-flex;align-items:center;gap:16px;}
.tb-icon{width:36px;height:36px;border-radius:999px;border:none;background:transparent;color:var(--text-2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;position:relative;}
.tb-icon:hover{background:var(--surface-100);}
@keyframes bellpulse{0%,100%{transform:none}15%{transform:rotate(-12deg)}30%{transform:rotate(10deg)}45%{transform:rotate(-8deg)}60%{transform:rotate(6deg)}75%{transform:rotate(-3deg)}}
.tb-icon.pulse{animation:bellpulse .7s ease;}
/* 🔔 未讀 badge */
.tb-badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;
  background:var(--danger);color:#fff;font-size:11px;font-weight:600;line-height:16px;text-align:center;}

.main{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Sidebar */
.sidebar{flex:0 0 256px;width:256px;background:#fff;border-right:1px solid var(--border);
  overflow-y:auto;transition:flex-basis .2s ease,width .2s ease;}
.sidebar.collapsed{flex-basis:56px;width:56px;overflow:hidden;}
.sidebar ul{list-style:none;margin:0;padding:0;}
.m-item{height:56px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:8px;
  cursor:pointer;transition:color .2s;white-space:nowrap;}
.m-item:hover{color:var(--primary);}
.m-item .lead{display:flex;align-items:center;gap:8px;}
.ico{width:20px;flex:0 0 20px;text-align:center;}
.m-group.active{background:var(--primary);color:#fff;}
.m-group.active:hover{color:#fff;}
.m-children{padding-left:16px;background:var(--neutral-100);}
.m-child{height:56px;padding:16px;display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:color .2s;white-space:nowrap;justify-content:space-between;}
.m-child .lead{display:flex;align-items:center;gap:8px;}
.m-child:hover{color:var(--primary);}
.m-child.active{color:var(--primary);border-right:4px solid var(--primary);}
.chev{font-size:12px;}
.sidebar.collapsed .lbl,.sidebar.collapsed .chev,.sidebar.collapsed .m-children{display:none;}
/* 側欄未讀小圓點 badge */
.nav-badge{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--danger);color:#fff;
  font-size:11px;font-weight:600;line-height:18px;text-align:center;}

.content{flex:1;min-width:0;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}

/* ================= 元件 ================= */
.card{background:var(--surface-0);border:1px solid var(--border);border-radius:var(--r-card);padding:24px;box-shadow:var(--card-shadow);}
.page-title{font-size:24px;font-weight:700;line-height:32px;margin:0;display:flex;align-items:center;gap:8px;}
.section-title{font-size:16px;font-weight:600;margin:0;}
.helper{font-size:12px;color:var(--text-2);}

.btn{height:40px;padding:0 16px;border-radius:var(--r);border:1px solid transparent;background:var(--primary);color:#fff;
  font-size:14px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{background:var(--primary-hover);}
.btn.secondary{background:#fff;color:var(--text-2);border-color:var(--border-strong);}
.btn.secondary:hover{background:var(--surface-50);}
.btn.outlined{background:#fff;color:var(--primary);border-color:var(--primary);}
.btn.outlined:hover{background:var(--primary-soft);}
.btn.sm{height:32px;padding:0 12px;font-size:14px;}

.field{display:flex;flex-direction:column;gap:8px;}
.field>label{font-size:14px;}
.req{color:var(--danger);}
.optional{font-size:12px;color:var(--muted);}
.input,.select,.textarea{width:100%;height:40px;padding:0 12px;font-size:14px;color:var(--text);background:#fff;
  border:1px solid var(--border-strong);border-radius:var(--r);transition:all .2s;}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft);}
.textarea{height:auto;padding:8px 12px;line-height:1.6;resize:vertical;font-size:14px;}
.input:disabled,.textarea:disabled{background:var(--surface-100);color:var(--muted);}
.input-icon{position:relative;}
.input-icon .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;}
.input-icon .input{padding-left:32px;}

.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl th{text-align:left;font-weight:600;padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tbody tr:nth-child(even){background:var(--surface-50);}
.tbl tbody tr:hover{background:var(--primary-soft);}
.tbl tbody tr.clickable{cursor:pointer;}
/* 收件匣：未讀白底 / 已讀淺灰；去斑馬紋與紫色 hover，只留未讀圓點 */
.inbox-tbl tbody tr{cursor:pointer;}
/* 底色語意：白＝進行中、淡灰＝已結束、淡紫＝hover。因底色承載狀態，此表不套隔行底色
   （用 .tbl.inbox-tbl 提高權重，蓋過全域的 nth-child(even) 斑馬紋） */
.tbl.inbox-tbl tbody tr{background:#fff;}
.tbl.inbox-tbl tbody tr.read{background:var(--neutral-100);}
.tbl.inbox-tbl tbody tr:hover{background:var(--primary-soft);}
.st{font-size:12px;font-weight:500;white-space:nowrap;}
.st.unread{color:var(--info);}
.st.off{color:var(--muted);font-weight:400;}
.sdot{width:7px;height:7px;border-radius:999px;background:var(--info);display:inline-block;margin-right:5px;vertical-align:1px;}
.udot{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--info);flex:none;}
.attr-ic{font-size:12px;color:var(--warn);cursor:default;}
/* 鈴鐺下拉面板 */
.bell-wrap{position:relative;}
.bell-panel{position:absolute;top:calc(100% + 8px);right:0;width:360px;background:#fff;border:1px solid var(--border);
  border-radius:var(--r-card);box-shadow:0 12px 32px rgba(0,0,0,.14);z-index:200;display:none;}
.bell-panel.open{display:block;}
.bp-hd{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);}
.bp-hd .t{font-weight:700;font-size:16px;}
.bp-hd .c{font-size:12px;color:var(--text-2);}
.bp-hd .clr{margin-left:auto;font-size:14px;color:var(--text-2);cursor:pointer;background:none;border:none;}
.bp-hd .clr:hover{color:var(--primary);}
.bp-body{max-height:400px;overflow-y:auto;padding:8px 0;}
.bp-sec{padding:8px 16px 4px;font-size:12px;color:var(--text-2);}
.bp-card{margin:0 12px 8px;border:1px solid var(--border);border-radius:var(--r);padding:12px;display:grid;
  grid-template-columns:32px 1fr;gap:12px;align-items:start;cursor:pointer;transition:background .2s;}
.bp-card:hover{background:var(--neutral-100);}
.bp-card>div{min-width:0;}
.bp-circ{width:32px;height:32px;border-radius:999px;background:var(--neutral-100);display:flex;align-items:center;justify-content:center;font-size:15px;}
.bp-title{font-weight:600;font-size:14px;}
.bp-sub{font-size:12px;color:var(--text-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bp-time{font-size:12px;color:var(--muted);margin-top:4px;}
.bp-empty{padding:32px 16px;text-align:center;color:var(--text-2);font-size:14px;}
.bp-ft{padding:12px 16px;border-top:1px solid var(--border);text-align:center;}
.bp-ft button{color:var(--info);font-size:14px;background:none;border:none;cursor:pointer;}
.bp-ft button:hover{text-decoration:underline;}
.sortic{color:var(--muted);font-size:11px;margin-left:4px;}
.table-scroll{overflow:auto;}
.empty{text-align:center;padding:48px 16px;color:var(--text-2);font-size:14px;}

.tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:2px 10px;border-radius:999px;white-space:nowrap;}
.tag .dot{width:6px;height:6px;border-radius:999px;background:currentColor;}
.tag.success{background:var(--success-soft);color:var(--success);}
.tag.danger{background:var(--danger-soft);color:var(--danger);}
.tag.warn{background:var(--warn-soft);color:var(--warn);}
.tag.info{background:var(--info-soft);color:var(--info);}
.tag.primary{background:var(--primary-soft);color:var(--primary);}
.tag.secondary{background:var(--surface-100);color:var(--text-2);}

.icobtn{width:32px;height:32px;border-radius:999px;border:none;background:transparent;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;position:relative;transition:all .2s;}
.icobtn:hover{background:var(--surface-100);}
.icobtn.view{color:var(--success);} .icobtn.edit{color:var(--primary);} .icobtn.read{color:var(--info);} .icobtn.muted{color:var(--muted);}
.icobtn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:var(--text);color:#fff;font-size:12px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:30;}

.paginator{display:flex;align-items:center;justify-content:center;gap:4px;padding-top:12px;}
.pg{min-width:32px;height:32px;padding:0 8px;border:none;background:transparent;border-radius:var(--r);
  color:var(--text-2);font-size:14px;cursor:pointer;}
.pg:hover{background:var(--surface-100);} .pg.active{background:var(--primary);color:#fff;}
.paginator .info{margin-left:12px;font-size:12px;color:var(--text-2);}

/* ===== Tabs（design.md 6.6；TabList px-6 對齊，7.1） ===== */
.tabs-row{display:flex;align-items:center;justify-content:space-between;gap:16px;
  border-bottom:1px solid var(--border);margin:-24px -24px 16px;padding:0 24px;}
.tabs{display:flex;gap:4px;flex:1;min-width:0;overflow-x:auto;border:0;margin:0;padding:0;}
.tabs::-webkit-scrollbar{height:0;}
.tabs-right{display:flex;align-items:center;gap:14px;flex:none;}
.btn.aux{height:36px;}
.tab{height:44px;padding:0 12px;border:none;background:transparent;color:var(--text-2);font-size:14px;font-weight:500;
  cursor:pointer;position:relative;display:inline-flex;align-items:center;gap:6px;transition:color .2s;}
.tab:hover{color:var(--primary);}
.tab.active{color:var(--primary);}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--primary);}
.tab .cnt{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--surface-100);color:var(--text-2);
  font-size:11px;font-weight:600;line-height:18px;text-align:center;}
.tab.active .cnt{background:var(--primary-soft);color:var(--primary);}

/* ===== ToggleSwitch（PrimeVue 對應） ===== */
.toggle{position:relative;display:inline-block;width:40px;height:22px;cursor:pointer;flex:0 0 40px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle .track{position:absolute;inset:0;background:var(--border-strong);border-radius:999px;transition:all .2s;}
.toggle .thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:999px;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle input:checked + .track{background:var(--primary);}
.toggle input:checked + .track + .thumb{transform:translateX(18px);}

/* ===== Drawer（右側抽屜） ===== */
.drawer-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:100;}
.drawer-mask.open{display:block;}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:100%;background:#fff;z-index:101;
  transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:-8px 0 24px rgba(0,0,0,.12);}
.drawer.open{transform:none;}
.dw-hd{flex:0 0 auto;padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.dw-hd h3{font-size:18px;font-weight:700;margin:0 0 4px;}
.dw-bd{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.dw-ft{flex:0 0 auto;padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.dw-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}

/* Dialog（收件匣詳情） */
.mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
.mask.open{display:flex;}
.dialog{background:#fff;border-radius:var(--r-card);width:560px;max-width:100%;box-shadow:0 20px 40px rgba(0,0,0,.15);animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.dlg-hd{padding:20px 24px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.dlg-bd{padding:0 24px 8px;}
.dlg-ft{padding:16px 24px 20px;display:flex;justify-content:flex-end;gap:8px;}
.dlg-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}

/* 變數 chip */
.var-chips{display:flex;flex-wrap:wrap;gap:8px;}
.var-chip{border:1px solid var(--border-strong);background:#fff;color:var(--text);border-radius:var(--r);
  padding:4px 10px;font-size:14px;cursor:pointer;transition:all .2s;font-family:ui-monospace,monospace;}
.var-chip:hover{border-color:var(--primary);background:var(--primary-soft);color:var(--primary);}

/* 預覽區 */
.preview{background:var(--neutral-100);border:1px dashed var(--border-strong);border-radius:var(--r);padding:12px 16px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
.kv{display:flex;gap:8px;font-size:14px;}
.kv .k{color:var(--text-2);flex:0 0 88px;}

/* 資訊條 */
.infobar{background:var(--info-soft);border:1px solid var(--info);border-radius:var(--r);padding:12px 16px;
  font-size:12px;color:var(--info);display:flex;gap:8px;align-items:flex-start;line-height:1.6;}

.module-path{font-size:12px;color:var(--text-2);}
.link{color:var(--info);text-decoration:none;font-size:14px;}
.link:hover{text-decoration:underline;}

/* 嵌入模式：整合頁以 ?embed=1 載入時，藏掉自帶側欄與 TopBar，只留內容區 */
body.embed .topbar,body.embed .sidebar{display:none;}
.page{display:none;}
.page.active{display:flex;flex-direction:column;gap:16px;}
.search-grid{display:grid;grid-template-columns:1fr 200px 200px;gap:8px;}
.search-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
@media(max-width:1200px){.search-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="app">

  <!-- TopBar：🔔 通知鈴鐺（未讀 badge）作為收件匣的便捷入口，主 IA 仍走側欄 -->
  <div class="topbar">
    <div class="tb-left">
      <div class="logo">X</div>
      <p class="sys-title" id="sys-title">直播管家</p>
      <button class="collapse-btn" id="collapse-btn" title="收合側邊欄" aria-label="收合側邊欄"><i class="fa-solid fa-angle-left"></i></button>
      <div class="switcher store"><span>好物直播間</span><span style="color:var(--muted);font-size:12px;"><i class="fa-solid fa-chevron-down"></i></span></div>
      <div class="switcher"><span>商店管理</span><span style="color:var(--muted);font-size:12px;"><i class="fa-solid fa-chevron-down"></i></span></div>
    </div>
    <div class="tb-right">
      <div class="bell-wrap">
        <button class="tb-icon" title="通知" id="bell-btn" aria-label="通知"><span><i class="fa-regular fa-bell"></i></span><span class="tb-badge" id="tb-unread">4</span></button>
        <div class="bell-panel" id="bell-panel">
          <div class="bp-hd">
            <span><i class="fa-regular fa-bell"></i></span><span class="t">通知中心</span><span class="c" id="bp-count">0 筆</span>
            <button class="clr" onclick="clearAllBell()">清除全部</button>
          </div>
          <div class="bp-body" id="bp-body"></div>
          <div class="bp-ft"><button onclick="gotoInbox()">查看全部通知</button></div>
        </div>
      </div>
      <button class="tb-icon" title="主題切換" aria-label="主題切換"><i class="fa-regular fa-moon"></i></button>
      <button class="tb-icon" title="語言" aria-label="語言"><i class="fa-solid fa-globe"></i></button>
      <button class="tb-icon" title="帳號" aria-label="帳號"><i class="fa-regular fa-user"></i></button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar：只保留與本功能相關的項目（其餘模組省略以利辨識）。

/* ===================== 收件匣渲染 ===================== */
let inboxCat='all', inboxUnreadOnly=false;
function catTag(cat){const c=CAT[cat]||['—','secondary'];return `<span class="tag ${c[1]}">${c[0]}</span>`;}
/* 收件匣時間省略年份（近期通知為主） */
function shortTime(t){ return String(t||'').replace(/^\d{4}\//,''); }
function nowStr(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
/** 置頂：由公司後台發送時勾選「置頂顯示」決定，不限則數，全部固定在最上方（新到舊） */
function pinnedIds(){
  return notifications.filter(n=>n.pinned)
    .sort((a,b)=>b.time.localeCompare(a.time)).map(n=>n.id);
}
function renderInbox(){
  const pins=pinnedIds();
  let rows=notifications.filter(n=>inboxCat==='all'||n.cat===inboxCat);
  if(inboxUnreadOnly)rows=rows.filter(n=>!n.read);
  // 置頂優先，其餘按時間新到舊
  rows.sort((a,b)=>{
    const pa=pins.includes(a.id),pb=pins.includes(b.id);
    if(pa!==pb)return pa?-1:1;
    return b.time.localeCompare(a.time);
  });
  const tb=document.getElementById('inbox-rows');
  tb.innerHTML = rows.length ? rows.map(n=>{
    const pinned=pins.includes(n.id);
    return `
    <tr class="${n.read?'read':'unread'}" onclick="openNotif('${n.id}')">
      <td>${catTag(n.cat)}</td>
      <td>
        <div style="font-weight:${n.read?'400':'600'};color:var(--text);display:flex;align-items:center;gap:6px;">
          ${n.read?'':'<span class="udot" aria-label="未讀"></span>'}
          ${pinned?'<i class="fa-solid fa-thumbtack attr-ic" title="置頂"></i>':''}
          ${n.stores?'<span class="tag info" style="padding:1px 8px;">適用門市</span>':''}
          <span>${n.title}</span>
        </div>
        <div style="font-size:12px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px;">${n.body}</div>
      </td>
      <td style="font-size:12px;color:var(--text-2);">${shortTime(n.time)}</td>
      <td>${n.read
        ? '<span class="st off">已讀</span>'
        : '<span class="st unread"><span class="sdot"></span>未讀</span>'}</td>
      <td><div style="display:flex;gap:4px;">
        <button class="icobtn ${n.read?'muted':'read'}" data-tip="${n.read?'標示為未讀':'標示為已讀'}" onclick="event.stopPropagation();toggleRead('${n.id}')"><i class="fa-regular ${n.read?'fa-envelope-open':'fa-envelope'}"></i></button>
      </div></td>
    </tr>`;}).join('') : `<tr><td colspan="5" class="empty">目前沒有通知</td></tr>`;
  document.getElementById('inbox-count').textContent=`每頁 10 筆 · 共 ${rows.length} 筆`;
  refreshUnread();
}
function refreshUnread(){
  const u=notifications.filter(n=>!n.read).length;
  document.getElementById('tb-unread').textContent=u;
  document.getElementById('nav-unread').textContent=u;
  document.getElementById('tb-unread').style.display=u?'block':'none';
  document.getElementById('nav-unread').style.display=u?'block':'none';
  document.getElementById('cnt-all').textContent=notifications.length;
  const bp=document.getElementById('bell-panel');
  if(bp&&bp.classList.contains('open'))renderBellPanel();
}

function iconOf(cat){
  const m={system:'fa-circle-info',maintenance:'fa-screwdriver-wrench',notice:'fa-circle-check',order:'fa-triangle-exclamation',customer:'fa-user'};

function renderBellPanel(){

/* ===== 與公司後台連動：讀共享 store，映射成收件匣通知，即時更新 ===== */
const CO_STORE_KEY='__xslCompanyNotifications';

function pulseBell(){ const b=document.getElementById('bell-btn'); if(!b)return; b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse'); setTimeout(()=>b.classList.remove('pulse'),900); }
function syncCompany(){
  let store=[];
  try{store=JSON.parse(localStorage.getItem(CO_STORE_KEY)||'[]');}catch(e){}
  const active=store.filter(x=>x.status==='sent' && !(x.endTime && !x.noEnd && x.endTime<=nowStr())); // 僅「公告中」（未過期）同步
  const prevUnread=notifications.filter(n=>!n.read).length;
  const readMap={};
  notifications.forEach(n=>{ if(String(n.id).indexOf('co-')===0) readMap[n.id]=n.read; });
  for(let i=notifications.length-1;i>=0;i--){ if(String(notifications[i].id).indexOf('co-')===0) notifications.splice(i,1); }
  active.forEach(x=>{
    const id='co-'+x.id;
    const cat=x.cat||'system'; // 公司端類別 id 即商家分類（兩端共用同一份清單）
    const sev=(CAT[cat]&&CAT[cat][1])||'info';
    notifications.push({id,cat,sev,title:x.title,body:x.body,read:(id in readMap)?readMap[id]:false,time:x.time,pinned:!!x.pinned,stores:(x.storeNames&&x.storeNames.length)?x.storeNames:null,action:null});
  });
  buildCAT(); renderInboxTabs();       // 分類清單可能被公司端更新
  renderInbox();                       // renderInbox → refreshUnread：更新鈴鐺紅點數與下拉
  if(notifications.filter(n=>!n.read).length>prevUnread) pulseBell();  // 有新未讀 → 鈴鐺晃動
  checkPopups();                       // 有廣播公告 → 優先跳彈窗
}
/* ===== 廣播公告彈窗：公司端 popup=true 的通知優先跳窗，可「下次不顯示」 ===== */
const POPUP_DISMISS_KEY='__xslPopupDismissed';
function loadDismissed(){ try{return JSON.parse(localStorage.getItem(POPUP_DISMISS_KEY)||'[]');}catch(e){return [];} }
function saveDismissed(a){ try{localStorage.setItem(POPUP_DISMISS_KEY,JSON.stringify(a));}catch(e){} }
let currentAnnounce=null;
function checkPopups(){
  // 嵌入整合頁時，廣播彈窗交給商家後台外層顯示，避免重複跳兩次
  if(document.body.classList.contains('embed'))return;
  const dlg=document.getElementById('dlg-announce');
  if(!dlg||dlg.classList.contains('open'))return;
  let store=[];
  try{store=JSON.parse(localStorage.getItem(CO_STORE_KEY)||'[]');}catch(e){}
  const dismissed=loadDismissed();
  const hit=store.find(x=>x.status==='sent'&&x.popup&&dismissed.indexOf(x.id)===-1);
  if(!hit)return;
  currentAnnounce=hit;
  const cat=hit.cat||'system';
  const sev=(CAT[cat]&&CAT[cat][1])||'info';
  document.getElementById('an-cat').innerHTML=`<span class="tag ${sev}">${(CAT[cat]&&CAT[cat][0])||'公告'}</span>`;
  document.getElementById('an-title').textContent=hit.title;
  document.getElementById('an-time').textContent=hit.time;
  document.getElementById('an-body').textContent=hit.body;
  document.getElementById('an-noshow').checked=false;
  dlg.classList.add('open');
}
function closeAnnounce(){
  if(currentAnnounce&&document.getElementById('an-noshow').checked){
    const d=loadDismissed();
    if(d.indexOf(currentAnnounce.id)===-1){ d.push(currentAnnounce.id); saveDismissed(d); }
  }
  currentAnnounce=null;
  document.getElementById('dlg-announce').classList.remove('open');
  setTimeout(checkPopups,300); // 還有下一則就接著顯示
}

window.addEventListener('storage',e=>{ if(e.key===CO_STORE_KEY) syncCompany(); });
if('BroadcastChannel' in window){ try{ const _bc=new BroadcastChannel('xsl-notify');
  _bc.onmessage=e=>{ if(e&&e.data&&e.data.t==='reset'){ location.reload(); } else { syncCompany(); } };
}catch(e){} }
syncCompany();
</script>
</body>
</html>
